[build]
  command = "pnpm build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"

# Cache Next.js + pnpm
[build.processing]
  skip_processing = false

[[headers]]
  for = "/*"
  [headers.values]
    Netlify-Vary = "query"


[[build.cache]]
  paths = [
    ".next/cache",
    "node_modules/.pnpm"
  ]